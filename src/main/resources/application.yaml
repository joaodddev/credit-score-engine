spring:
  application:
    name: credit-score-engine

  datasource:
    url: jdbc:h2:mem:creditscoredb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

app:
  jwt:
    secret: 3cF8zK1mP9vQ2rT5wX7yB0nA4dE6hJ
    expiration-ms: 86400000